name: Monthly security scan

on:
  workflow_dispatch:
  schedule:
    # Run at 03:00 JST on the first day of every month.
    - cron: "0 18 1 * *"

permissions:
  contents: read
  issues: write

jobs:
  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm run security:audit

  zap-baseline:
    name: OWASP ZAP baseline scan
    runs-on: ubuntu-latest
    steps:
      - name: Scan public site
        uses: zaproxy/action-baseline@v0.15.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: "https://ortace.jp"
          issue_title: "OWASP ZAP monthly baseline scan"
          fail_action: false
